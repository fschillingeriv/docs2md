name: Sync llms-full.txt from Bitwarden

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour — adjust as needed
  workflow_dispatch:        # Allows manual triggering from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest llms-full.txt
        run: |
          curl -fsSL "https://bitwarden.com/help/llms-full.txt/" -o llms-full.txt

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms-full.txt
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: sync llms-full.txt from bitwarden.com"
          git push
